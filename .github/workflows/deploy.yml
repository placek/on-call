name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Minimum permissions for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; queue new runs but don't cancel
# an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

# Silence the "Node.js 20 actions are deprecated" warning by opting the
# JS-based actions (checkout, setup-node, configure-pages, deploy-pages)
# into the Node 24 runtime ahead of the June 2026 cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # GitHub Pages serves project sites under /<repo>/, so we pass that
        # prefix through to Vite via BASE_PATH (see vite.config.js).
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configure Pages
        # enablement: true provisions the Pages site on first run via the
        # API, so you don't need to flip Settings → Pages manually.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
